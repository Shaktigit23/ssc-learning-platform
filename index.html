
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Class 6 SSC Chapter-wise Practice</title>
<style>
body{font-family:Arial;margin:0;background:#f2f5ff}
header{background:#2b6cb0;color:white;padding:20px;text-align:center}
.subjects{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;padding:15px}
.subjects button{padding:10px 15px;border:none;background:#2b6cb0;color:white;border-radius:6px;cursor:pointer}
.container{max-width:900px;margin:auto;padding:20px}
.card{background:white;border-radius:10px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,0.1)}
.chapter-btn{margin:5px;padding:8px 12px;border:none;background:#4a7bd1;color:white;border-radius:5px;cursor:pointer}
.option{border:1px solid #ddd;padding:8px;margin:6px 0;border-radius:6px;cursor:pointer}
.option:hover{background:#eef2ff}
.score{font-weight:bold;font-size:18px}
</style>
</head>
<body>

<header>
<h1>Class 6 SSC Exam Preparation</h1>
<p>Chapter-wise Practice Tests with MCQs</p>
</header>

<div class="subjects">
<button onclick="loadSubject('math')">Math</button>
<button onclick="loadSubject('science')">Science</button>
<button onclick="loadSubject('english')">English</button>
<button onclick="loadSubject('social')">Social Studies</button>
</div>

<div class="container">
<div class="card">
<h2 id="title">Select Subject</h2>
<div id="chapters"></div>
<div id="quiz"></div>
<p id="score" class="score"></p>
</div>
</div>

<script>
let score=0;
let currentQuestions=[];

const data={
math:{
"Chapter 1: Numbers":[
{q:"Smallest number?",options:["5","1","9","7"],answer:1},
{q:"10 + 15 = ?",options:["20","25","30","35"],answer:1}
],
"Chapter 2: Multiplication":[
{q:"12 × 6 = ?",options:["72","60","66","70"],answer:0},
{q:"8 × 9 = ?",options:["72","81","63","70"],answer:0}
]
},
science:{
"Chapter 1: Food Sources":[
{q:"Plants prepare food by?",options:["Photosynthesis","Respiration","Digestion","Absorption"],answer:0}
],
"Chapter 2: Components of Food":[
{q:"Energy giving nutrient?",options:["Carbohydrate","Vitamin","Water","Mineral"],answer:0}
]
},
english:{
"Chapter 1: Nouns":[
{q:"Which is noun?",options:["Run","School","Quickly","Blue"],answer:1}
],
"Chapter 2: Pronouns":[
{q:"Which is pronoun?",options:["He","Table","Book","Chair"],answer:0}
]
},
social:{
"Chapter 1: India Map":[
{q:"Capital of India?",options:["Mumbai","Delhi","Chennai","Kolkata"],answer:1}
],
"Chapter 2: Freedom Fighters":[
{q:"Father of Nation?",options:["Gandhi","Nehru","Bose","Patel"],answer:0}
]
}
};

function loadSubject(subject){
let chapters=data[subject];
let html="";
document.getElementById("title").innerText="Select Chapter";

for(let ch in chapters){
html+=`<button class='chapter-btn' onclick="loadQuiz('${subject}','${ch}')">${ch}</button>`;
}

document.getElementById("chapters").innerHTML=html;
document.getElementById("quiz").innerHTML="";
}

function loadQuiz(subject,chapter){
score=0;
currentQuestions=data[subject][chapter];
let quizHTML=`<h3>${chapter}</h3>`;

currentQuestions.forEach((q,index)=>{
quizHTML+=`<p>${index+1}. ${q.q}</p>`;
q.options.forEach((opt,i)=>{
quizHTML+=`<div class='option' onclick='check(${index},${i})'>${opt}</div>`;
});
});

document.getElementById("quiz").innerHTML=quizHTML;
document.getElementById("score").innerText="";
}

function check(qIndex,optIndex){
if(optIndex===currentQuestions[qIndex].answer){
score++;
alert("Correct");
}else{
alert("Wrong");
}

document.getElementById("score").innerText="Score: "+score+" / "+currentQuestions.length;
}
</script>

</body>
</html>
<link rel="stylesheet" href="style.css">
